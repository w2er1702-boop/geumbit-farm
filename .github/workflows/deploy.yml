name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SIXSHOP_URL: ${{ vars.NEXT_PUBLIC_SIXSHOP_URL }}
          NEXT_PUBLIC_NAVER_STORE_URL: ${{ vars.NEXT_PUBLIC_NAVER_STORE_URL }}
          NEXT_PUBLIC_CONTACT_ENDPOINT: ${{ vars.NEXT_PUBLIC_CONTACT_ENDPOINT }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_PRICE_MODE: ${{ vars.NEXT_PUBLIC_PRICE_MODE }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

      # === Cafe24 시안 프리뷰 추가 배포 (/cafe24-preview/) ===
      - name: Checkout cafe24-skin branch
        uses: actions/checkout@v4
        with:
          ref: cafe24-skin
          path: cafe24-branch

      - name: Build Cafe24 preview
        working-directory: cafe24-branch
        run: node preview/build.mjs

      - name: Mount preview under out/cafe24-preview/
        run: |
          mkdir -p out/cafe24-preview
          cp -R cafe24-branch/preview/site/. out/cafe24-preview/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
