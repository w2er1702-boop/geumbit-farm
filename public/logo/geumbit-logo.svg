<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="GEUMBIT FARM · 한여울바이오밸리">
  <title>GEUMBIT FARM 금빛농원</title>
  <defs>
    <linearGradient id="gbGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#E2C07A"/>
      <stop offset="45%" stop-color="#B7894A"/>
      <stop offset="100%" stop-color="#7E5A28"/>
    </linearGradient>
    <linearGradient id="gbGoldSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#D8B373"/>
      <stop offset="100%" stop-color="#94692E"/>
    </linearGradient>
  </defs>

  <!-- Mark: three nested arches (mountains / rows of harvest) -->
  <g transform="translate(160 140)">
    <!-- outermost arch -->
    <path d="M -100 30 A 100 100 0 0 1 100 30 L 78 30 A 78 78 0 0 0 -78 30 Z"
          fill="url(#gbGold)"/>
    <!-- middle arch -->
    <path d="M -64 30 A 64 64 0 0 1 64 30 L 42 30 A 42 42 0 0 0 -42 30 Z"
          fill="url(#gbGoldSoft)"/>
    <!-- inner arch -->
    <path d="M -28 30 A 28 28 0 0 1 28 30 L 12 30 A 12 12 0 0 0 -12 30 Z"
          fill="#A8803C"/>
    <!-- small accent dot -->
    <circle cx="0" cy="-66" r="6" fill="#C9A961"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Cormorant Garamond','Nanum Myeongjo',serif">
    <text x="160" y="232" text-anchor="middle" font-size="34" font-weight="700"
          letter-spacing="2" fill="#231B12">GEUMBIT FARM</text>
    <text x="160" y="260" text-anchor="middle" font-size="13" font-weight="500"
          letter-spacing="3" fill="#5B4E3E">HANYEOUL BIO VALLEY CO., LTD.</text>
  </g>
</svg>
