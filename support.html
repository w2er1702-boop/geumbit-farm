<!DOCTYPE html>
<html lang="ko" data-base="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객센터 · 금빛농원</title>
  <meta name="description" content="금빛농원 고객센터 — 전화·운영시간·이메일 및 1:1 문의." />
  <meta property="og:title" content="고객센터 · 금빛농원" />
  <meta name="theme-color" content="#231B12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="support">
  <div data-include="partials/header.html"></div>

  <main>
    <section class="page-hero bg-paper-2">
      <div class="container">
        <p class="breadcrumb"><a href="index.html">HOME</a><span class="sep">/</span>고객센터</p>
        <span class="section-label mt-1">Customer Center</span>
        <h1 class="h-1">고객센터</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="split" style="align-items:start;">
          <div data-reveal>
            <div class="footer-cs" style="color:var(--ink);">
              <span class="section-label">전화 문의</span>
              <p class="num" style="color:var(--ink);font-size:2.4rem;">1577-0000</p>
            </div>
            <dl class="pdp-meta mt-2" style="font-size:.95rem;">
              <div><dt>운영시간</dt><dd>평일 10:00 – 17:00</dd></div>
              <div><dt>점심시간</dt><dd>12:00 – 13:00</dd></div>
              <div><dt>휴무</dt><dd>주말 · 공휴일</dd></div>
              <div><dt>이메일</dt><dd><a class="text-link" href="mailto:help@geumbitfarm.kr">help@geumbitfarm.kr</a></dd></div>
            </dl>
            <p class="lead mt-3">자주 묻는 질문은 <a class="text-link" href="community.html">COMMUNITY의 FAQ</a>에서 빠르게 확인하실 수 있습니다.</p>
          </div>

          <div data-reveal data-delay="1">
            <h2 class="h-3 mb-2">1:1 문의</h2>
            <form class="form-grid" style="max-width:none;" data-stub-form="시안 — 문의 접수는 운영 전환 시 활성화됩니다.">
              <div class="form-row"><label for="su-name">이름 <span class="req">*</span></label><input class="field" id="su-name" type="text" required /></div>
              <div class="form-row"><label for="su-mail">이메일 <span class="req">*</span></label><input class="field" id="su-mail" type="email" required /></div>
              <div class="form-row"><label for="su-cat">문의 유형</label>
                <select class="field" id="su-cat"><option>주문/결제</option><option>배송</option><option>교환/반품</option><option>상품 문의</option><option>기타</option></select>
              </div>
              <div class="form-row"><label for="su-msg">문의 내용 <span class="req">*</span></label><textarea class="field" id="su-msg" required></textarea></div>
              <button class="btn btn-fill btn-block" type="submit">문의 보내기</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-include="partials/footer.html"></div>
  <script src="assets/js/main.js"></script>
</body>
</html>
