<!DOCTYPE html>
<html lang="ko" data-base="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 · 금빛농원</title>
  <meta name="description" content="금빛농원 장바구니 (시안)." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#231B12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="cart">
  <div data-include="partials/header.html"></div>

  <main>
    <section class="section">
      <div class="container">
        <p class="breadcrumb mb-2"><a href="index.html">HOME</a><span class="sep">/</span>장바구니</p>
        <div class="flex items-center gap-2 wrap mb-3">
          <h1 class="h-1">장바구니</h1>
          <span class="stub-note">시안 — 결제는 Cafe24 모듈로 동작합니다.</span>
        </div>

        <div class="split" style="align-items:start;grid-template-columns:1.6fr 1fr;">
          <div>
            <table class="cart-table">
              <thead><tr><th>상품</th><th style="width:90px;">수량</th><th style="width:120px;text-align:right;">금액</th></tr></thead>
              <tbody>
                <tr>
                  <td>
                    <div class="cart-line">
                      <div class="media"><div class="ph"><span class="ph-slot">진액</span></div></div>
                      <div><strong>유기농 황금상황버섯 진액 90ml × 30포</strong><br /><span class="muted" style="font-size:.84rem;">기본 구성</span></div>
                    </div>
                  </td>
                  <td>
                    <div class="qty"><button type="button" data-qty-dec aria-label="감소">−</button><input type="text" value="1" aria-label="수량" /><button type="button" data-qty-inc aria-label="증가">+</button></div>
                  </td>
                  <td style="text-align:right;font-weight:700;">112,000원</td>
                </tr>
                <tr>
                  <td>
                    <div class="cart-line">
                      <div class="media"><div class="ph"><span class="ph-slot">슬라이스</span></div></div>
                      <div><strong>유기농 황금상황버섯 슬라이스 250g</strong><br /><span class="muted" style="font-size:.84rem;">기본 구성</span></div>
                    </div>
                  </td>
                  <td>
                    <div class="qty"><button type="button" data-qty-dec aria-label="감소">−</button><input type="text" value="1" aria-label="수량" /><button type="button" data-qty-inc aria-label="증가">+</button></div>
                  </td>
                  <td style="text-align:right;font-weight:700;">97,500원</td>
                </tr>
              </tbody>
            </table>
          </div>

          <aside class="cart-summary">
            <h2 class="h-3 mb-2">주문 요약</h2>
            <div class="row"><span>상품 금액</span><span>209,500원</span></div>
            <div class="row"><span>배송비</span><span>무료</span></div>
            <div class="row total"><span>결제 예정</span><span>209,500원</span></div>
            <button class="btn btn-fill btn-block mt-2" type="button" data-stub="시안 — 주문/결제는 운영(Cafe24) 전환 시 활성화됩니다.">주문하기</button>
            <a class="btn btn-out btn-block mt-1" href="products.html">쇼핑 계속하기</a>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div data-include="partials/footer.html"></div>
  <script src="assets/js/main.js"></script>
</body>
</html>
